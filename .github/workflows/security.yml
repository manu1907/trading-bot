name: Security

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  pull-requests: read
  security-events: write

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Gradle quality gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Run tests and local analyzers
        run: ./gradlew --no-daemon clean build

  container-image:
    name: Container image build
    runs-on: ubuntu-latest
    needs:
      - quality-gate
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Build boot jar
        run: ./gradlew --no-daemon :bot-app:bootJar

      - name: Capture image metadata
        id: image-metadata
        run: |
          mkdir -p build/container
          echo "created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"
          cat > build/container/image-build-context.json <<JSON
          {
            "image": "trading-bot:${GITHUB_SHA}",
            "source": "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}",
            "revision": "${GITHUB_SHA}",
            "version": "${GITHUB_REF_NAME}",
            "workflow_run": "${GITHUB_RUN_ID}",
            "workflow_attempt": "${GITHUB_RUN_ATTEMPT}"
          }
          JSON

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          build-args: |
            IMAGE_CREATED=${{ steps.image-metadata.outputs.created }}
            IMAGE_REVISION=${{ github.sha }}
            IMAGE_SOURCE=${{ github.server_url }}/${{ github.repository }}
            IMAGE_VERSION=${{ github.ref_name }}
          labels: |
            org.opencontainers.image.created=${{ steps.image-metadata.outputs.created }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ github.ref_name }}
          metadata-file: build/container/buildx-metadata.json
          tags: trading-bot:${{ github.sha }}

      - name: Upload image build metadata
        uses: actions/upload-artifact@v5
        with:
          name: trading-bot-image-metadata-${{ github.sha }}
          path: build/container/*.json
          if-no-files-found: error

  codeql:
    name: CodeQL SAST
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin
          queries: security-extended,security-and-quality

      - name: Build for CodeQL
        run: ./gradlew --no-daemon clean assemble

      - name: Analyze with CodeQL
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:java-kotlin"

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Review dependency changes
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          show-openssf-scorecard: true
          vulnerability-check: true
          license-check: true

  filesystem-vulnerability-scan:
    name: Filesystem vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Scan repository with Grype
        uses: anchore/scan-action@v7.4.0
        with:
          path: "."
          grype-version: v0.112.0
          fail-build: true
          severity-cutoff: high
          output-format: table

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Scan Git history for secrets
        run: >
          docker run --rm
          -v "$PWD:/repo"
          ghcr.io/gitleaks/gitleaks:v8.30.0
          detect
          --source /repo
          --config /repo/.gitleaks.toml
          --no-banner
          --redact
          --verbose
