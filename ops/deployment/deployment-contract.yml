schema_version: 1
schema_id: io.github.manu.trading-bot.deployment-contract

required_top_level_sections:
  - contract
  - deployment
  - runtime_env
  - secret_env
  - alertmanager_secret_substitutions
  - audit_backend
  - state_backend

optional_top_level_sections:
  - deployment_controls

contract:
  id: io.github.manu.trading-bot.deployment-contract
  version: 1

required_deployment_fields:
  - platform
  - runtime
  - environment
  - provider
  - account
  - market
  - service_name
  - image

required_runtime_env_common:
  SPRING_PROFILES_ACTIVE: live
  BOT_CONFIG_DIR: /app/config
  BOT_PROVIDER: binance
  BOT_ACCOUNT: main
  BOT_MARKET: usdm_futures
  TRADING_INTERVENTION_OPERATOR_API_ENABLED: "true"
  TRADING_AUDIT_PAUSE_GOVERNANCE_FILE_STORE_ENABLED: "false"
  TRADING_AUDIT_PAUSE_GOVERNANCE_JDBC_STORE_ENABLED: "true"
  TRADING_AUDIT_PAUSE_GOVERNANCE_JDBC_STORE_TABLE_PREFIX: trading_audit_pause_governance_
  TRADING_AUDIT_PAUSE_GOVERNANCE_JDBC_STORE_INITIALIZE_SCHEMA: "false"
  TRADING_PROJECTION_SNAPSHOT_STORE_ENABLED: "false"
  TRADING_PROJECTION_JDBC_STORE_ENABLED: "true"
  TRADING_PROJECTION_JDBC_STORE_TABLE_PREFIX: trading_projection_
  TRADING_PROJECTION_JDBC_STORE_INITIALIZE_SCHEMA: "false"

required_runtime_env_by_environment:
  demo:
    BOT_ENVIRONMENT: demo
  real:
    BOT_ENVIRONMENT: real
    TRADING_INTERVENTION_REMEDIATION_EXECUTOR_POLICY_ENABLED: "false"
    TRADING_INTERVENTION_REMEDIATION_EXECUTOR_POLICY_EXCHANGE_EXECUTION_ENABLED: "false"
    TRADING_INTERVENTION_REMEDIATION_EXECUTOR_POLICY_REPORT_ONLY: "true"
    TRADING_INTERVENTION_REMEDIATION_EXECUTOR_POLICY_ALLOW_REAL_ENVIRONMENT: "false"

required_secret_env_common:
  - TRADING_INTERVENTION_OPERATOR_API_OPERATOR_TOKEN
  - TRADING_AUDIT_PAUSE_GOVERNANCE_JDBC_URL
  - TRADING_AUDIT_PAUSE_GOVERNANCE_JDBC_USERNAME
  - TRADING_AUDIT_PAUSE_GOVERNANCE_JDBC_PASSWORD
  - TRADING_PROJECTION_JDBC_URL
  - TRADING_PROJECTION_JDBC_USERNAME
  - TRADING_PROJECTION_JDBC_PASSWORD

required_secret_env_by_environment:
  demo:
    - BINANCE_DEMO_API_KEY
    - BINANCE_DEMO_API_SECRET
  real:
    - BINANCE_REAL_API_KEY
    - BINANCE_REAL_API_SECRET

required_alertmanager_secret_substitutions:
  - ALERTMANAGER_TRADING_BOT_OPERATOR_PAGERDUTY_ROUTING_KEY
  - ALERTMANAGER_TRADING_BOT_PLATFORM_PAGERDUTY_ROUTING_KEY
  - ALERTMANAGER_TRADING_BOT_SMTP_SMARTHOST
  - ALERTMANAGER_TRADING_BOT_SMTP_FROM
  - ALERTMANAGER_TRADING_BOT_SMTP_AUTH_USERNAME
  - ALERTMANAGER_TRADING_BOT_SMTP_AUTH_PASSWORD
  - ALERTMANAGER_TRADING_BOT_OPERATOR_EMAIL_TO
  - ALERTMANAGER_TRADING_BOT_PLATFORM_EMAIL_TO
  - ALERTMANAGER_TRADING_BOT_FALLBACK_EMAIL_TO
  - ALERTMANAGER_TRADING_BOT_OPERATOR_SLACK_WEBHOOK
  - ALERTMANAGER_TRADING_BOT_OPERATOR_SLACK_CHANNEL
  - ALERTMANAGER_TRADING_BOT_PLATFORM_SLACK_WEBHOOK
  - ALERTMANAGER_TRADING_BOT_PLATFORM_SLACK_CHANNEL
  - ALERTMANAGER_TRADING_BOT_FALLBACK_SLACK_WEBHOOK
  - ALERTMANAGER_TRADING_BOT_FALLBACK_SLACK_CHANNEL

secret_binding_shape:
  required_fields:
    - secret
    - version
  forbidden_inline_patterns:
    - hooks.slack.com
    - xoxb-
    - pd_
    - -----BEGIN
    - jdbc:postgresql://

audit_backend:
  required_selected: jdbc
  minimum_retention_days: 180
  required_jdbc_fields:
    - database
    - schema_owner
    - table_prefix
    - retention_days
    - backups
  required_backup_fields:
    - enabled
    - mechanism
    - minimum_recovery_days
    - restore_test_interval_days

state_backend:
  required_projection_selected: jdbc
  minimum_projection_retention_days: 180
  required_journal_archive:
    enabled: true
    layout: trading_event_archive_layout_v1
  required_projection_jdbc_fields:
    - database
    - schema_owner
    - table_prefix
    - retention_days
    - compaction
    - backups
  required_compaction_fields:
    - enabled
    - minimum_interval_days
    - preserve_latest_snapshot
    - preserve_applied_event_ids
  required_backup_fields:
    - enabled
    - mechanism
    - minimum_recovery_days
    - restore_test_interval_days
