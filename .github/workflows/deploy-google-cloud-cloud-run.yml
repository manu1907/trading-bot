name: Deploy Google Cloud Cloud Run

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target runtime environment and GitHub environment gate.
        required: true
        type: choice
        options:
          - demo
          - real
      commit_sha:
        description: Full commit SHA whose published image should be deployed. Defaults to the workflow ref SHA.
        required: false
        type: string

permissions:
  contents: read
  id-token: write
  actions: read

concurrency:
  group: deploy-google-cloud-cloud-run-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Cloud Run service
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Resolve deployment target
        id: target
        shell: bash
        run: |
          set -euo pipefail
          requested_sha="${{ inputs.commit_sha }}"
          if [ -z "$requested_sha" ]; then
            requested_sha="${GITHUB_SHA}"
          fi
          case "${{ inputs.environment }}" in
            demo)
              service_name="trading-bot-demo-main-usdm-futures"
              cloud_sql_instance="${{ vars.GCP_PROJECT_ID }}:${{ vars.GCP_REGION }}:${{ vars.GCP_CLOUD_SQL_INSTANCE }}"
              contract_path="ops/google-cloud/demo-usdm-futures-deployment.yml"
              secret_env="BINANCE_DEMO_API_KEY=trading-bot-demo-binance-api-key:latest,BINANCE_DEMO_API_SECRET=trading-bot-demo-binance-api-secret:latest,TRADING_INTERVENTION_OPERATOR_API_OPERATOR_TOKEN=trading-bot-demo-operator-token:latest,TRADING_AUDIT_PAUSE_GOVERNANCE_JDBC_URL=trading-bot-demo-audit-jdbc-url:latest,TRADING_AUDIT_PAUSE_GOVERNANCE_JDBC_USERNAME=trading-bot-demo-audit-jdbc-username:latest,TRADING_AUDIT_PAUSE_GOVERNANCE_JDBC_PASSWORD=trading-bot-demo-audit-jdbc-password:latest,TRADING_PROJECTION_JDBC_URL=trading-bot-demo-projection-jdbc-url:latest,TRADING_PROJECTION_JDBC_USERNAME=trading-bot-demo-projection-jdbc-username:latest,TRADING_PROJECTION_JDBC_PASSWORD=trading-bot-demo-projection-jdbc-password:latest"
              runtime_env="SPRING_PROFILES_ACTIVE=live,BOT_CONFIG_DIR=/app/config,BOT_PROVIDER=binance,BOT_ENVIRONMENT=demo,BOT_ACCOUNT=main,BOT_MARKET=usdm_futures,TRADING_INTERVENTION_OPERATOR_API_ENABLED=true,TRADING_AUDIT_PAUSE_GOVERNANCE_FILE_STORE_ENABLED=false,TRADING_AUDIT_PAUSE_GOVERNANCE_JDBC_STORE_ENABLED=true,TRADING_AUDIT_PAUSE_GOVERNANCE_JDBC_STORE_TABLE_PREFIX=trading_audit_pause_governance_,TRADING_AUDIT_PAUSE_GOVERNANCE_JDBC_STORE_INITIALIZE_SCHEMA=false,TRADING_PROJECTION_SNAPSHOT_STORE_ENABLED=false,TRADING_PROJECTION_JDBC_STORE_ENABLED=true,TRADING_PROJECTION_JDBC_STORE_TABLE_PREFIX=trading_projection_,TRADING_PROJECTION_JDBC_STORE_INITIALIZE_SCHEMA=false"
              ;;
            real)
              service_name="trading-bot-real-main-usdm-futures"
              cloud_sql_instance="${{ vars.GCP_PROJECT_ID }}:${{ vars.GCP_REGION }}:${{ vars.GCP_CLOUD_SQL_INSTANCE }}"
              contract_path="ops/google-cloud/real-usdm-futures-deployment.yml"
              secret_env="BINANCE_REAL_API_KEY=trading-bot-real-binance-api-key:latest,BINANCE_REAL_API_SECRET=trading-bot-real-binance-api-secret:latest,TRADING_INTERVENTION_OPERATOR_API_OPERATOR_TOKEN=trading-bot-real-operator-token:latest,TRADING_AUDIT_PAUSE_GOVERNANCE_JDBC_URL=trading-bot-real-audit-jdbc-url:latest,TRADING_AUDIT_PAUSE_GOVERNANCE_JDBC_USERNAME=trading-bot-real-audit-jdbc-username:latest,TRADING_AUDIT_PAUSE_GOVERNANCE_JDBC_PASSWORD=trading-bot-real-audit-jdbc-password:latest,TRADING_PROJECTION_JDBC_URL=trading-bot-real-projection-jdbc-url:latest,TRADING_PROJECTION_JDBC_USERNAME=trading-bot-real-projection-jdbc-username:latest,TRADING_PROJECTION_JDBC_PASSWORD=trading-bot-real-projection-jdbc-password:latest"
              runtime_env="SPRING_PROFILES_ACTIVE=live,BOT_CONFIG_DIR=/app/config,BOT_PROVIDER=binance,BOT_ENVIRONMENT=real,BOT_ACCOUNT=main,BOT_MARKET=usdm_futures,TRADING_INTERVENTION_OPERATOR_API_ENABLED=true,TRADING_INTERVENTION_REMEDIATION_EXECUTOR_POLICY_ENABLED=false,TRADING_INTERVENTION_REMEDIATION_EXECUTOR_POLICY_EXCHANGE_EXECUTION_ENABLED=false,TRADING_INTERVENTION_REMEDIATION_EXECUTOR_POLICY_REPORT_ONLY=true,TRADING_INTERVENTION_REMEDIATION_EXECUTOR_POLICY_ALLOW_REAL_ENVIRONMENT=false,TRADING_AUDIT_PAUSE_GOVERNANCE_FILE_STORE_ENABLED=false,TRADING_AUDIT_PAUSE_GOVERNANCE_JDBC_STORE_ENABLED=true,TRADING_AUDIT_PAUSE_GOVERNANCE_JDBC_STORE_TABLE_PREFIX=trading_audit_pause_governance_,TRADING_AUDIT_PAUSE_GOVERNANCE_JDBC_STORE_INITIALIZE_SCHEMA=false,TRADING_PROJECTION_SNAPSHOT_STORE_ENABLED=false,TRADING_PROJECTION_JDBC_STORE_ENABLED=true,TRADING_PROJECTION_JDBC_STORE_TABLE_PREFIX=trading_projection_,TRADING_PROJECTION_JDBC_STORE_INITIALIZE_SCHEMA=false"
              ;;
            *) echo "Unsupported environment: ${{ inputs.environment }}" >&2; exit 1 ;;
          esac
          if ! [[ "$requested_sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "commit_sha must be a full 40-character lowercase git SHA" >&2
            exit 1
          fi
          short_sha="${requested_sha:0:12}"
          image="${{ vars.GCP_ARTIFACT_REGISTRY_LOCATION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_ARTIFACT_REGISTRY_REPOSITORY }}/trading-bot:${requested_sha}"
          echo "sha=$requested_sha" >> "$GITHUB_OUTPUT"
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"
          echo "image=$image" >> "$GITHUB_OUTPUT"
          echo "service_name=$service_name" >> "$GITHUB_OUTPUT"
          echo "cloud_sql_instance=$cloud_sql_instance" >> "$GITHUB_OUTPUT"
          echo "contract_path=$contract_path" >> "$GITHUB_OUTPUT"
          echo "runtime_env=$runtime_env" >> "$GITHUB_OUTPUT"
          echo "secret_env=$secret_env" >> "$GITHUB_OUTPUT"

      - name: Checkout requested commit
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.target.outputs.sha }}

      - name: Verify source CI passed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          response="$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/actions/runs?head_sha=${{ steps.target.outputs.sha }}&event=push&per_page=20")"
          passed_runs="$(printf '%s' "$response" \
            | jq '[.workflow_runs[] | select(.name == "Security" and .conclusion == "success")] | length')"
          if [ "$passed_runs" -lt 1 ]; then
            echo "Security workflow has not passed for ${{ steps.target.outputs.sha }}" >&2
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_CLOUD_RUN_DEPLOY_SERVICE_ACCOUNT }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Verify published image exists
        run: gcloud artifacts docker images describe "${{ steps.target.outputs.image }}" --project "${{ vars.GCP_PROJECT_ID }}" --quiet

      - name: Deploy Cloud Run revision
        id: deploy
        run: |
          set -euo pipefail
          mkdir -p build/deployment
          revision_suffix="${{ inputs.environment }}-${{ steps.target.outputs.short_sha }}"
          gcloud run deploy "${{ steps.target.outputs.service_name }}" \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --region "${{ vars.GCP_REGION }}" \
            --platform managed \
            --image "${{ steps.target.outputs.image }}" \
            --service-account "${{ secrets.GCP_CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT }}" \
            --no-allow-unauthenticated \
            --execution-environment gen2 \
            --port 8080 \
            --cpu "${{ vars.GCP_CLOUD_RUN_CPU }}" \
            --memory "${{ vars.GCP_CLOUD_RUN_MEMORY }}" \
            --min-instances "${{ vars.GCP_CLOUD_RUN_MIN_INSTANCES }}" \
            --max-instances "${{ vars.GCP_CLOUD_RUN_MAX_INSTANCES }}" \
            --timeout "${{ vars.GCP_CLOUD_RUN_TIMEOUT }}" \
            --add-cloudsql-instances "${{ steps.target.outputs.cloud_sql_instance }}" \
            --revision-suffix "$revision_suffix" \
            --labels "app=trading-bot,environment=${{ inputs.environment }},commit-sha=${{ steps.target.outputs.sha }}" \
            --set-env-vars "${{ steps.target.outputs.runtime_env }}" \
            --set-secrets "${{ steps.target.outputs.secret_env }}" \
            --quiet
          url="$(gcloud run services describe "${{ steps.target.outputs.service_name }}" \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --region "${{ vars.GCP_REGION }}" \
            --format='value(status.url)')"
          echo "url=$url" >> "$GITHUB_OUTPUT"
          cat > build/deployment/google-cloud-run-deployment.json <<JSON
          {
            "service": "${{ steps.target.outputs.service_name }}",
            "environment": "${{ inputs.environment }}",
            "image": "${{ steps.target.outputs.image }}",
            "cloud_sql_instance": "${{ steps.target.outputs.cloud_sql_instance }}",
            "revision_suffix": "$revision_suffix",
            "source_revision": "${{ steps.target.outputs.sha }}",
            "contract": "${{ steps.target.outputs.contract_path }}",
            "url": "$url",
            "workflow_run": "${GITHUB_RUN_ID}",
            "workflow_attempt": "${GITHUB_RUN_ATTEMPT}"
          }
          JSON

      - name: Upload deployment metadata
        uses: actions/upload-artifact@v5
        with:
          name: trading-bot-google-cloud-run-${{ inputs.environment }}-${{ steps.target.outputs.sha }}
          path: build/deployment/*.json
          if-no-files-found: error
