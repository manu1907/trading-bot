schema_version: 1

contract:
  id: io.github.manu.trading-bot.deployment-contract
  version: 1

deployment:
  platform: google_cloud
  runtime: cloud_run
  environment: real
  provider: binance
  account: main
  market: usdm_futures
  service_name: trading-bot-real-main-usdm-futures
  region: ${GCP_REGION}
  image: ${TRADING_BOT_IMAGE}

runtime_env:
  SPRING_PROFILES_ACTIVE: live
  BOT_CONFIG_DIR: /app/config
  BOT_PROVIDER: binance
  BOT_ENVIRONMENT: real
  BOT_ACCOUNT: main
  BOT_MARKET: usdm_futures
  TRADING_INTERVENTION_OPERATOR_API_ENABLED: "true"
  TRADING_INTERVENTION_REMEDIATION_EXECUTOR_POLICY_ENABLED: "false"
  TRADING_INTERVENTION_REMEDIATION_EXECUTOR_POLICY_EXCHANGE_EXECUTION_ENABLED: "false"
  TRADING_INTERVENTION_REMEDIATION_EXECUTOR_POLICY_REPORT_ONLY: "true"
  TRADING_INTERVENTION_REMEDIATION_EXECUTOR_POLICY_ALLOW_REAL_ENVIRONMENT: "false"
  TRADING_AUDIT_PAUSE_GOVERNANCE_FILE_STORE_ENABLED: "false"
  TRADING_AUDIT_PAUSE_GOVERNANCE_JDBC_STORE_ENABLED: "true"
  TRADING_AUDIT_PAUSE_GOVERNANCE_JDBC_STORE_TABLE_PREFIX: trading_audit_pause_governance_
  TRADING_AUDIT_PAUSE_GOVERNANCE_JDBC_STORE_INITIALIZE_SCHEMA: "false"

secret_env:
  BINANCE_REAL_API_KEY:
    secret: trading-bot-real-binance-api-key
    version: latest
  BINANCE_REAL_API_SECRET:
    secret: trading-bot-real-binance-api-secret
    version: latest
  TRADING_INTERVENTION_OPERATOR_API_OPERATOR_TOKEN:
    secret: trading-bot-real-operator-token
    version: latest
  TRADING_AUDIT_PAUSE_GOVERNANCE_JDBC_URL:
    secret: trading-bot-real-audit-jdbc-url
    version: latest
  TRADING_AUDIT_PAUSE_GOVERNANCE_JDBC_USERNAME:
    secret: trading-bot-real-audit-jdbc-username
    version: latest
  TRADING_AUDIT_PAUSE_GOVERNANCE_JDBC_PASSWORD:
    secret: trading-bot-real-audit-jdbc-password
    version: latest

alertmanager_secret_substitutions:
  ALERTMANAGER_TRADING_BOT_OPERATOR_PAGERDUTY_ROUTING_KEY:
    secret: trading-bot-real-alert-operator-pagerduty-routing-key
    version: latest
  ALERTMANAGER_TRADING_BOT_PLATFORM_PAGERDUTY_ROUTING_KEY:
    secret: trading-bot-real-alert-platform-pagerduty-routing-key
    version: latest
  ALERTMANAGER_TRADING_BOT_OPERATOR_SLACK_WEBHOOK:
    secret: trading-bot-real-alert-operator-slack-webhook
    version: latest
  ALERTMANAGER_TRADING_BOT_OPERATOR_SLACK_CHANNEL:
    secret: trading-bot-real-alert-operator-slack-channel
    version: latest
  ALERTMANAGER_TRADING_BOT_PLATFORM_SLACK_WEBHOOK:
    secret: trading-bot-real-alert-platform-slack-webhook
    version: latest
  ALERTMANAGER_TRADING_BOT_PLATFORM_SLACK_CHANNEL:
    secret: trading-bot-real-alert-platform-slack-channel
    version: latest
  ALERTMANAGER_TRADING_BOT_FALLBACK_SLACK_WEBHOOK:
    secret: trading-bot-real-alert-fallback-slack-webhook
    version: latest
  ALERTMANAGER_TRADING_BOT_FALLBACK_SLACK_CHANNEL:
    secret: trading-bot-real-alert-fallback-slack-channel
    version: latest

audit_backend:
  selected: jdbc
  jdbc:
    database: cloud_sql_postgresql
    schema_owner: deployment_migration
    table_prefix: trading_audit_pause_governance_
    retention_days: 365
    backups:
      enabled: true
      mechanism: cloud_sql_automated_backup
      minimum_recovery_days: 35
      restore_test_interval_days: 30

deployment_controls:
  require_manual_approval: true
  require_demo_promotion_evidence: true
  require_real_secret_isolation: true
  real_trading_initial_state: exchange_execution_disabled
  allowed_real_operations: []
  promotion_source: demo_live_burn_in
