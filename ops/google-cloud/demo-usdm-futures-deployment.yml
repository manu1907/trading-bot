schema_version: 1

contract:
  id: io.github.manu.trading-bot.deployment-contract
  version: 1

deployment:
  platform: google_cloud
  runtime: cloud_run
  environment: demo
  provider: binance
  account: main
  market: usdm_futures
  service_name: trading-bot-demo-main-usdm-futures
  region: ${GCP_REGION}
  image: ${TRADING_BOT_IMAGE}

runtime_env:
  SPRING_PROFILES_ACTIVE: live
  BOT_CONFIG_DIR: /app/config
  BOT_PROVIDER: binance
  BOT_ENVIRONMENT: demo
  BOT_ACCOUNT: main
  BOT_MARKET: usdm_futures
  TRADING_INTERVENTION_OPERATOR_API_ENABLED: "true"
  TRADING_AUDIT_PAUSE_GOVERNANCE_FILE_STORE_ENABLED: "false"
  TRADING_AUDIT_PAUSE_GOVERNANCE_JDBC_STORE_ENABLED: "true"
  TRADING_AUDIT_PAUSE_GOVERNANCE_JDBC_STORE_TABLE_PREFIX: trading_audit_pause_governance_
  TRADING_AUDIT_PAUSE_GOVERNANCE_JDBC_STORE_INITIALIZE_SCHEMA: "false"
  TRADING_PROJECTION_SNAPSHOT_STORE_ENABLED: "false"
  TRADING_PROJECTION_JDBC_STORE_ENABLED: "true"
  TRADING_PROJECTION_JDBC_STORE_TABLE_PREFIX: trading_projection_
  TRADING_PROJECTION_JDBC_STORE_INITIALIZE_SCHEMA: "false"

secret_env:
  BINANCE_DEMO_API_KEY:
    secret: trading-bot-demo-binance-api-key
    version: latest
  BINANCE_DEMO_API_SECRET:
    secret: trading-bot-demo-binance-api-secret
    version: latest
  TRADING_INTERVENTION_OPERATOR_API_OPERATOR_TOKEN:
    secret: trading-bot-demo-operator-token
    version: latest
  TRADING_AUDIT_PAUSE_GOVERNANCE_JDBC_URL:
    secret: trading-bot-demo-audit-jdbc-url
    version: latest
  TRADING_AUDIT_PAUSE_GOVERNANCE_JDBC_USERNAME:
    secret: trading-bot-demo-audit-jdbc-username
    version: latest
  TRADING_AUDIT_PAUSE_GOVERNANCE_JDBC_PASSWORD:
    secret: trading-bot-demo-audit-jdbc-password
    version: latest
  TRADING_PROJECTION_JDBC_URL:
    secret: trading-bot-demo-projection-jdbc-url
    version: latest
  TRADING_PROJECTION_JDBC_USERNAME:
    secret: trading-bot-demo-projection-jdbc-username
    version: latest
  TRADING_PROJECTION_JDBC_PASSWORD:
    secret: trading-bot-demo-projection-jdbc-password
    version: latest

alertmanager_secret_substitutions:
  ALERTMANAGER_TRADING_BOT_OPERATOR_PAGERDUTY_ROUTING_KEY:
    secret: trading-bot-demo-alert-operator-pagerduty-routing-key
    version: latest
  ALERTMANAGER_TRADING_BOT_PLATFORM_PAGERDUTY_ROUTING_KEY:
    secret: trading-bot-demo-alert-platform-pagerduty-routing-key
    version: latest
  ALERTMANAGER_TRADING_BOT_OPERATOR_SLACK_WEBHOOK:
    secret: trading-bot-demo-alert-operator-slack-webhook
    version: latest
  ALERTMANAGER_TRADING_BOT_OPERATOR_SLACK_CHANNEL:
    secret: trading-bot-demo-alert-operator-slack-channel
    version: latest
  ALERTMANAGER_TRADING_BOT_PLATFORM_SLACK_WEBHOOK:
    secret: trading-bot-demo-alert-platform-slack-webhook
    version: latest
  ALERTMANAGER_TRADING_BOT_PLATFORM_SLACK_CHANNEL:
    secret: trading-bot-demo-alert-platform-slack-channel
    version: latest
  ALERTMANAGER_TRADING_BOT_FALLBACK_SLACK_WEBHOOK:
    secret: trading-bot-demo-alert-fallback-slack-webhook
    version: latest
  ALERTMANAGER_TRADING_BOT_FALLBACK_SLACK_CHANNEL:
    secret: trading-bot-demo-alert-fallback-slack-channel
    version: latest

audit_backend:
  selected: jdbc
  jdbc:
    database: cloud_sql_postgresql
    schema_owner: deployment_migration
    table_prefix: trading_audit_pause_governance_
    retention_days: 180
    backups:
      enabled: true
      mechanism: cloud_sql_automated_backup
      minimum_recovery_days: 7
      restore_test_interval_days: 90

state_backend:
  projection:
    selected: jdbc
    jdbc:
      database: cloud_sql_postgresql
      schema_owner: deployment_migration
      table_prefix: trading_projection_
      retention_days: 180
      compaction:
        enabled: true
        minimum_interval_days: 7
        preserve_latest_snapshot: true
        preserve_applied_event_ids: true
      backups:
        enabled: true
        mechanism: cloud_sql_automated_backup
        minimum_recovery_days: 7
        restore_test_interval_days: 90
  journal_archive:
    enabled: true
    mechanism: cloud_storage_object_archive
    bucket: ${TRADING_BOT_JOURNAL_ARCHIVE_BUCKET}
    prefix: demo/main/usdm_futures
    layout: trading_event_archive_layout_v1
    retention_days: 180
