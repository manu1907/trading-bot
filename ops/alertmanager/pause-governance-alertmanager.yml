global:
  resolve_timeout: 5m

route:
  receiver: trading-bot-fallback
  group_by:
    - service
    - routing_hint
    - severity
    - alertname
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 2h
  routes:
    - receiver: trading-bot-platform-critical
      matchers:
        - service="trading-bot"
        - routing_hint="platform"
        - severity="critical"
      continue: false

    - receiver: trading-bot-operator-critical
      matchers:
        - service="trading-bot"
        - routing_hint="operator"
        - severity="critical"
      continue: false

    - receiver: trading-bot-operator-warning
      matchers:
        - service="trading-bot"
        - routing_hint="operator"
        - severity="warning"
      continue: false

    - receiver: trading-bot-operator-info
      matchers:
        - service="trading-bot"
        - routing_hint="operator"
        - severity="info"
      continue: false

receivers:
  - name: trading-bot-fallback
    slack_configs:
      - api_url: ${ALERTMANAGER_TRADING_BOT_FALLBACK_SLACK_WEBHOOK}
        channel: ${ALERTMANAGER_TRADING_BOT_FALLBACK_SLACK_CHANNEL}
        send_resolved: true
        title: '[trading-bot] {{ .CommonLabels.alertname }}'
        text: >-
          {{ range .Alerts }}{{ .Annotations.summary }}
          {{ .Annotations.description }}
          Labels: {{ .Labels }}
          {{ end }}

  - name: trading-bot-platform-critical
    pagerduty_configs:
      - routing_key: ${ALERTMANAGER_TRADING_BOT_PLATFORM_PAGERDUTY_ROUTING_KEY}
        severity: critical
        send_resolved: true
        description: '{{ .CommonAnnotations.summary }}'
        details:
          service: '{{ .CommonLabels.service }}'
          routing_hint: '{{ .CommonLabels.routing_hint }}'
          alertname: '{{ .CommonLabels.alertname }}'
          description: '{{ .CommonAnnotations.description }}'
    slack_configs:
      - api_url: ${ALERTMANAGER_TRADING_BOT_PLATFORM_SLACK_WEBHOOK}
        channel: ${ALERTMANAGER_TRADING_BOT_PLATFORM_SLACK_CHANNEL}
        send_resolved: true
        title: '[critical][platform] {{ .CommonLabels.alertname }}'
        text: '{{ .CommonAnnotations.description }}'

  - name: trading-bot-operator-critical
    pagerduty_configs:
      - routing_key: ${ALERTMANAGER_TRADING_BOT_OPERATOR_PAGERDUTY_ROUTING_KEY}
        severity: critical
        send_resolved: true
        description: '{{ .CommonAnnotations.summary }}'
        details:
          service: '{{ .CommonLabels.service }}'
          routing_hint: '{{ .CommonLabels.routing_hint }}'
          alertname: '{{ .CommonLabels.alertname }}'
          description: '{{ .CommonAnnotations.description }}'
    slack_configs:
      - api_url: ${ALERTMANAGER_TRADING_BOT_OPERATOR_SLACK_WEBHOOK}
        channel: ${ALERTMANAGER_TRADING_BOT_OPERATOR_SLACK_CHANNEL}
        send_resolved: true
        title: '[critical][operator] {{ .CommonLabels.alertname }}'
        text: '{{ .CommonAnnotations.description }}'

  - name: trading-bot-operator-warning
    slack_configs:
      - api_url: ${ALERTMANAGER_TRADING_BOT_OPERATOR_SLACK_WEBHOOK}
        channel: ${ALERTMANAGER_TRADING_BOT_OPERATOR_SLACK_CHANNEL}
        send_resolved: true
        title: '[warning][operator] {{ .CommonLabels.alertname }}'
        text: '{{ .CommonAnnotations.description }}'

  - name: trading-bot-operator-info
    slack_configs:
      - api_url: ${ALERTMANAGER_TRADING_BOT_OPERATOR_SLACK_WEBHOOK}
        channel: ${ALERTMANAGER_TRADING_BOT_OPERATOR_SLACK_CHANNEL}
        send_resolved: true
        title: '[info][operator] {{ .CommonLabels.alertname }}'
        text: '{{ .CommonAnnotations.description }}'
