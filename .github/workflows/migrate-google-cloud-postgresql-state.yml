name: Migrate Google Cloud PostgreSQL State

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target runtime environment and GitHub environment gate.
        required: true
        type: choice
        options:
          - demo
          - real
      commit_sha:
        description: Full commit SHA whose schema files should be applied. Defaults to the workflow ref SHA.
        required: false
        type: string
      schema:
        description: State schema to migrate.
        required: true
        type: choice
        default: all
        options:
          - all
          - projection
          - audit
      confirm_real_migration:
        description: For real only, enter RUN_REAL_DATABASE_MIGRATION.
        required: false
        type: string

permissions:
  contents: read
  id-token: write
  actions: read

concurrency:
  group: migrate-google-cloud-postgresql-state-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  migrate:
    name: Migrate PostgreSQL state schema
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Resolve migration target
        id: target
        shell: bash
        run: |
          set -euo pipefail
          requested_sha="${{ inputs.commit_sha }}"
          if [ -z "$requested_sha" ]; then
            requested_sha="${GITHUB_SHA}"
          fi
          if ! [[ "$requested_sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "commit_sha must be a full 40-character lowercase git SHA" >&2
            exit 1
          fi
          case "${{ inputs.environment }}" in
            demo)
              audit_url_secret="trading-bot-demo-audit-jdbc-url"
              audit_username_secret="trading-bot-demo-audit-jdbc-username"
              audit_password_secret="trading-bot-demo-audit-jdbc-password"
              projection_url_secret="trading-bot-demo-projection-jdbc-url"
              projection_username_secret="trading-bot-demo-projection-jdbc-username"
              projection_password_secret="trading-bot-demo-projection-jdbc-password"
              contract_path="ops/google-cloud/demo-usdm-futures-deployment.yml"
              ;;
            real)
              if [ "${{ inputs.confirm_real_migration }}" != "RUN_REAL_DATABASE_MIGRATION" ]; then
                echo "Real database migration requires confirm_real_migration=RUN_REAL_DATABASE_MIGRATION" >&2
                exit 1
              fi
              audit_url_secret="trading-bot-real-audit-jdbc-url"
              audit_username_secret="trading-bot-real-audit-jdbc-username"
              audit_password_secret="trading-bot-real-audit-jdbc-password"
              projection_url_secret="trading-bot-real-projection-jdbc-url"
              projection_username_secret="trading-bot-real-projection-jdbc-username"
              projection_password_secret="trading-bot-real-projection-jdbc-password"
              contract_path="ops/google-cloud/real-usdm-futures-deployment.yml"
              ;;
            *) echo "Unsupported environment: ${{ inputs.environment }}" >&2; exit 1 ;;
          esac
          echo "sha=$requested_sha" >> "$GITHUB_OUTPUT"
          echo "contract_path=$contract_path" >> "$GITHUB_OUTPUT"
          echo "audit_url_secret=$audit_url_secret" >> "$GITHUB_OUTPUT"
          echo "audit_username_secret=$audit_username_secret" >> "$GITHUB_OUTPUT"
          echo "audit_password_secret=$audit_password_secret" >> "$GITHUB_OUTPUT"
          echo "projection_url_secret=$projection_url_secret" >> "$GITHUB_OUTPUT"
          echo "projection_username_secret=$projection_username_secret" >> "$GITHUB_OUTPUT"
          echo "projection_password_secret=$projection_password_secret" >> "$GITHUB_OUTPUT"
          echo "output_dir=build/database-migration/${{ inputs.environment }}" >> "$GITHUB_OUTPUT"

      - name: Checkout requested commit
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.target.outputs.sha }}

      - name: Verify source CI passed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          response="$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/actions/runs?head_sha=${{ steps.target.outputs.sha }}&event=push&per_page=20")"
          passed_runs="$(printf '%s' "$response" \
            | jq '[.workflow_runs[] | select(.name == "Security" and .conclusion == "success")] | length')"
          if [ "$passed_runs" -lt 1 ]; then
            echo "Security workflow has not passed for ${{ steps.target.outputs.sha }}" >&2
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_CLOUD_SQL_MIGRATION_SERVICE_ACCOUNT }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Install PostgreSQL client and Cloud SQL Auth Proxy
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          mkdir -p build/tools
          curl -fsSL -o build/tools/cloud-sql-proxy \
            https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.18.3/cloud-sql-proxy.linux.amd64
          chmod +x build/tools/cloud-sql-proxy

      - name: Load migration database secrets
        shell: bash
        run: |
          set -euo pipefail
          load_secret() {
            local env_name="$1"
            local secret_name="$2"
            local value
            value="$(gcloud secrets versions access latest --secret "$secret_name" --project "${{ vars.GCP_PROJECT_ID }}")"
            echo "::add-mask::$value"
            {
              echo "${env_name}<<EOF_SECRET"
              echo "$value"
              echo "EOF_SECRET"
            } >> "$GITHUB_ENV"
          }
          load_secret MIGRATION_AUDIT_JDBC_URL "${{ steps.target.outputs.audit_url_secret }}"
          load_secret MIGRATION_AUDIT_JDBC_USERNAME "${{ steps.target.outputs.audit_username_secret }}"
          load_secret MIGRATION_AUDIT_JDBC_PASSWORD "${{ steps.target.outputs.audit_password_secret }}"
          load_secret MIGRATION_PROJECTION_JDBC_URL "${{ steps.target.outputs.projection_url_secret }}"
          load_secret MIGRATION_PROJECTION_JDBC_USERNAME "${{ steps.target.outputs.projection_username_secret }}"
          load_secret MIGRATION_PROJECTION_JDBC_PASSWORD "${{ steps.target.outputs.projection_password_secret }}"

      - name: Migrate projection schema
        if: ${{ inputs.schema == 'all' || inputs.schema == 'projection' }}
        shell: bash
        run: |
          set -euo pipefail
          ops/database/migrate-postgresql-state.sh \
            --environment "${{ inputs.environment }}" \
            --schema projection \
            --jdbc-url "$MIGRATION_PROJECTION_JDBC_URL" \
            --username "$MIGRATION_PROJECTION_JDBC_USERNAME" \
            --password-env MIGRATION_PROJECTION_JDBC_PASSWORD \
            --cloud-sql-proxy build/tools/cloud-sql-proxy \
            --output-dir "${{ steps.target.outputs.output_dir }}/projection"

      - name: Migrate audit schema
        if: ${{ inputs.schema == 'all' || inputs.schema == 'audit' }}
        shell: bash
        run: |
          set -euo pipefail
          ops/database/migrate-postgresql-state.sh \
            --environment "${{ inputs.environment }}" \
            --schema audit \
            --jdbc-url "$MIGRATION_AUDIT_JDBC_URL" \
            --username "$MIGRATION_AUDIT_JDBC_USERNAME" \
            --password-env MIGRATION_AUDIT_JDBC_PASSWORD \
            --cloud-sql-proxy build/tools/cloud-sql-proxy \
            --output-dir "${{ steps.target.outputs.output_dir }}/audit"

      - name: Write migration metadata
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${{ steps.target.outputs.output_dir }}"
          cat > "${{ steps.target.outputs.output_dir }}/migration-metadata.json" <<JSON
          {
            "environment": "${{ inputs.environment }}",
            "schema": "${{ inputs.schema }}",
            "commit_sha": "${{ steps.target.outputs.sha }}",
            "contract": "${{ steps.target.outputs.contract_path }}",
            "workflow_run": "${GITHUB_RUN_ID}",
            "workflow_attempt": "${GITHUB_RUN_ATTEMPT}"
          }
          JSON

      - name: Upload migration evidence
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: trading-bot-postgresql-state-migration-${{ inputs.environment }}-${{ inputs.schema }}-${{ steps.target.outputs.sha }}
          path: ${{ steps.target.outputs.output_dir }}/**/*
          if-no-files-found: error
