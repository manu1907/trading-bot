name: Smoke Google Cloud Cloud Run

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target runtime environment and GitHub environment gate.
        required: true
        type: choice
        options:
          - demo
          - real
      commit_sha:
        description: Full commit SHA expected to be deployed. Defaults to the workflow ref SHA.
        required: false
        type: string

permissions:
  contents: read
  id-token: write
  actions: read

concurrency:
  group: smoke-google-cloud-cloud-run-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  smoke:
    name: Smoke Cloud Run service
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Resolve smoke target
        id: target
        shell: bash
        run: |
          set -euo pipefail
          requested_sha="${{ inputs.commit_sha }}"
          if [ -z "$requested_sha" ]; then
            requested_sha="${GITHUB_SHA}"
          fi
          case "${{ inputs.environment }}" in
            demo)
              service_name="trading-bot-demo-main-usdm-futures"
              contract_path="ops/google-cloud/demo-usdm-futures-deployment.yml"
              ;;
            real)
              service_name="trading-bot-real-main-usdm-futures"
              contract_path="ops/google-cloud/real-usdm-futures-deployment.yml"
              ;;
            *) echo "Unsupported environment: ${{ inputs.environment }}" >&2; exit 1 ;;
          esac
          if ! [[ "$requested_sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "commit_sha must be a full 40-character lowercase git SHA" >&2
            exit 1
          fi
          image="${{ vars.GCP_ARTIFACT_REGISTRY_LOCATION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_ARTIFACT_REGISTRY_REPOSITORY }}/trading-bot:${requested_sha}"
          echo "sha=$requested_sha" >> "$GITHUB_OUTPUT"
          echo "image=$image" >> "$GITHUB_OUTPUT"
          echo "service_name=$service_name" >> "$GITHUB_OUTPUT"
          echo "contract_path=$contract_path" >> "$GITHUB_OUTPUT"

      - name: Checkout requested commit
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.target.outputs.sha }}

      - name: Verify source CI passed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          response="$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/actions/runs?head_sha=${{ steps.target.outputs.sha }}&event=push&per_page=20")"
          passed_runs="$(printf '%s' "$response" \
            | jq '[.workflow_runs[] | select(.name == "Security" and .conclusion == "success")] | length')"
          if [ "$passed_runs" -lt 1 ]; then
            echo "Security workflow has not passed for ${{ steps.target.outputs.sha }}" >&2
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_CLOUD_RUN_SMOKE_SERVICE_ACCOUNT }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Verify deployed revision and readiness
        id: smoke
        run: |
          set -euo pipefail
          mkdir -p build/smoke
          service="${{ steps.target.outputs.service_name }}"
          url="$(gcloud run services describe "$service" \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --region "${{ vars.GCP_REGION }}" \
            --format='value(status.url)')"
          revision="$(gcloud run services describe "$service" \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --region "${{ vars.GCP_REGION }}" \
            --format='value(status.latestReadyRevisionName)')"
          deployed_sha="$(gcloud run revisions describe "$revision" \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --region "${{ vars.GCP_REGION }}" \
            --format='value(metadata.labels.commit-sha)')"
          deployed_image="$(gcloud run revisions describe "$revision" \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --region "${{ vars.GCP_REGION }}" \
            --format='value(spec.containers[0].image)')"
          if [ "$deployed_sha" != "${{ steps.target.outputs.sha }}" ]; then
            echo "Latest ready revision $revision is labeled $deployed_sha, expected ${{ steps.target.outputs.sha }}" >&2
            exit 1
          fi
          case "$deployed_image" in
            *":${{ steps.target.outputs.sha }}") ;;
            *) echo "Latest ready revision image is $deployed_image, expected tag ${{ steps.target.outputs.sha }}" >&2; exit 1 ;;
          esac
          identity_jwt="$(gcloud auth print-identity-token --audiences="$url")"
          curl -fsS \
            -H "Authorization: Bearer ${identity_jwt}" \
            "${url}/actuator/health/readiness" \
            -o build/smoke/readiness.json
          if ! grep -q '"status"[[:space:]]*:[[:space:]]*"UP"' build/smoke/readiness.json; then
            echo "Cloud Run readiness endpoint is not UP" >&2
            cat build/smoke/readiness.json >&2
            exit 1
          fi
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "revision=$revision" >> "$GITHUB_OUTPUT"
          echo "deployed_image=$deployed_image" >> "$GITHUB_OUTPUT"
          cat > build/smoke/google-cloud-run-smoke.json <<JSON
          {
            "service": "$service",
            "environment": "${{ inputs.environment }}",
            "expected_source_revision": "${{ steps.target.outputs.sha }}",
            "deployed_source_revision": "$deployed_sha",
            "expected_image": "${{ steps.target.outputs.image }}",
            "deployed_image": "$deployed_image",
            "revision": "$revision",
            "contract": "${{ steps.target.outputs.contract_path }}",
            "readiness_endpoint": "${url}/actuator/health/readiness",
            "readiness_status": "UP",
            "workflow_run": "${GITHUB_RUN_ID}",
            "workflow_attempt": "${GITHUB_RUN_ATTEMPT}"
          }
          JSON

      - name: Upload smoke metadata
        uses: actions/upload-artifact@v5
        with:
          name: trading-bot-google-cloud-run-smoke-${{ inputs.environment }}-${{ steps.target.outputs.sha }}
          path: build/smoke/*.json
          if-no-files-found: error
