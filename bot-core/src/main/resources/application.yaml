# Spring only selects the coarse runtime mode here: live or backtest.
spring:
  application:
    name: bot-core
  profiles:
    active: live

# Actuator for health checks / metrics (low footprint)
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    export:
      prometheus:
        enabled: true

# Logging – we use Logback, configured in logback-spring.xml
logging:
  config: classpath:logback-spring.xml

trading:
  journal:
    enabled: false
    directory: data/journal/trading-events
    recovery:
      enabled: false
  projection:
    snapshot-store:
      enabled: false
      path: data/projection/trading-state-snapshot.json
    jdbc-store:
      enabled: false
      url: ${TRADING_PROJECTION_JDBC_URL:}
      username: ${TRADING_PROJECTION_JDBC_USERNAME:}
      password: ${TRADING_PROJECTION_JDBC_PASSWORD:}
      table-prefix: trading_projection_
      initialize-schema: false
  execution:
    risk-gate:
      enabled: true
      reconciliation:
        required: true
        reject-no-observations: true
        reject-degraded: true
  messaging:
    enabled: false
    bootstrap-servers: localhost:19092
    schema-registry-url: http://localhost:18081
    client-id-prefix: trading-bot
    topics:
      auto-create: false
      replication-factor: 1
    consumers:
      enabled: false
      auto-start: false
      group-id-suffix: dispatcher
      poll-timeout-millis: 250
